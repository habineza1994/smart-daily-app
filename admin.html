<h2>Admin Dashboard</h2>

<h3>Users</h3>
<ul>
{% for u in users %}
  <li>{{ u.username }}
    <a href="/disable/{{u.id}}">Disable</a>
  </li>
{% endfor %}
</ul>

<h3>All Records</h3>
<ul>
{% for r in records %}
  <li>{{ r.username }}: {{ r.content }}</li>
{% endfor %}
</ul>

<a href="/logout">Logout</a>
